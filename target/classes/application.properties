# configuracao do bd
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=topicos1
quarkus.datasource.password=123456
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/topicos1db
quarkus.datasource.jdbc.initial-size=2

quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=true
quarkus.hibernate-orm.log.bind-parameters=true

# configuracao do cors
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:4200
quarkus.http.cors.methods=GET,PUT,POST,DELETE,PATCH,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.exposed-headers=Authorization,Content-Disposition,X-Page,X-Page-Size,X-Total-Count
quarkus.http.cors.access-control-max-age=24H
quarkus.http.cors.access-control-allow-credentials=true

# base url para problem details
%dev.problem.base-url=http://localhost:8080
%prod.problem.base-url=https://api.kauangamestore.com

# configuracao do jwt
mp.jwt.verify.publickey.location=token/publicKey.pem
mp.jwt.verify.issuer=kauan-games-jwt
smallrye.jwt.sign.key.location=token/privateKey.pem

# log detalhado no perfil dev
%dev.quarkus.log.console.enable=true
%dev.quarkus.log.console.level=DEBUG
%dev.quarkus.log.category."com.kauangamestore".level=DEBUG
